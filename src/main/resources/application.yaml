spring:
  application:
    name: moonment-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

fastapi:
  base-url: ${FASTAPI_BASE_URL}
  connect-timeout-ms: ${FASTAPI_CONNECT_TIMEOUT_MS:5000}
  # 실측 기준 LLM+이미지 생성 순차 호출이 50~56초 걸림. 재시도까지 고려해 여유 있게 설정 (B4)
  read-timeout-ms: ${FASTAPI_READ_TIMEOUT_MS:120000}

management:
  endpoints:
    web:
      exposure:
        include: health