spring:
  application:
    name: moonment-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

server:
  address: 0.0.0.0
  port: ${PORT:8080}

fastapi:
  base-url: ${FASTAPI_BASE_URL}
  connect-timeout-ms: ${FASTAPI_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${FASTAPI_READ_TIMEOUT_MS:120000}

management:
  endpoints:
    web:
      exposure:
        include: health
  metrics:
    enable:
      system: false
      process: false